services:
  spark-master:
    image: apache/spark:4.0.1
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./apps:/opt/spark/apps
      - ./data:/opt/spark/data

  spark-worker-1:
    image: apache/spark:4.0.1
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ./apps:/opt/spark/apps
      - ./data:/opt/spark/data

  spark-worker-2:
    image: apache/spark:4.0.1
    container_name: spark-worker-2
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8082:8081"
    volumes:
      - ./apps:/opt/spark/apps
      - ./data:/opt/spark/data

  spark-client:
    image: apache/spark:4.0.1
    container_name: spark-client
    depends_on:
      - spark-master
    ports:
      - "10000:10000"
    command: sleep infinity
    volumes:
      - ./apps:/opt/spark/apps
      - ./data:/opt/spark/data
